# Canonical dependabot config (swift ecosystem only) — synced by
# Scripts/sync-dependabot.sh per [GH-REPO-077].
#
# This template is written to every per-package repo (one with
# Package.swift at root). Per-package repos following [GH-REPO-074]
# are thin callers — their workflow files reference centralized
# reusables via `uses: <org>/.github/.../@main`, which is a branch
# ref Dependabot does NOT scan. There is therefore no github-actions
# ecosystem entry here: the only bumpable deps these repos own are
# their Package.swift dependencies.
#
# If a per-package repo grows inline action refs, that is a
# [GH-REPO-074] violation — migrate the workflow to a thin caller,
# do NOT add a github-actions ecosystem entry to this file.
version: 2
updates:
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      swift:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "swift"
    commit-message:
      prefix: "chore(deps)"
